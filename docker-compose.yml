services:
  # Node.js service (use with: docker compose up nextjs-standalone --build)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:5000
    image: nextjs-standalone-image
    container_name: nextjs-standalone-container
    environment:
      NODE_ENV: production
      PORT: "3000"
    ports:
      - "3000:3000"
    restart: unless-stopped
    depends_on:
      - backend
  

  backend:
    image: ${DOCKER_REGISTRY-}userexplorerapi
    build:
      context: ./backend
      dockerfile: UserExplorerApi/Dockerfile
    container_name: userexplorerapi
    ports:
      - "5000:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_HTTP_PORTS=8080
      - ConnectionStrings__DefaultConnection=Host=pgsql;Database=userexplorer;Username=postgres;Password=password
    depends_on:
      - pgsql

  pgsql:
    image: postgres:16
    container_name: postgres16
    ports:
      - "5432:5432"
    environment:
      POSTGRES_PASSWORD: password
      POSTGRES_USER: postgres
      POSTGRES_DB: userexplorer
    volumes:
      - "postgres_data:/var/lib/postgresql/data"

volumes:
  postgres_data:
